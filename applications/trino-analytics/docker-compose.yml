services:
  postgres:
    image: postgres:16-alpine
    container_name: trino-postgres
    environment:
      POSTGRES_USER: trino_demo
      POSTGRES_PASSWORD: trino_demo
      POSTGRES_DB: demo
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/trino/init/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trino_demo -d demo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: trino-mysql
    environment:
      MYSQL_ROOT_PASSWORD: trino_root
      MYSQL_DATABASE: demo
      MYSQL_USER: trino_demo
      MYSQL_PASSWORD: trino_demo
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/trino/init/mysql:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u",
          "root",
          "-ptrino_root",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s
    restart: unless-stopped

  trino:
    image: trinodb/trino:latest
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      # Official image expects catalog configs under /etc/trino/catalog
      - ./src/trino/catalogs:/etc/trino/catalog
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: trino-frontend
    ports:
      - "3000:3000"
    environment:
      - TRINO_URL=http://trino:8080
      - NEXT_PUBLIC_TRINO_UI=http://localhost:8080
    depends_on:
      - trino
    restart: unless-stopped

volumes:
  postgres_data:
  mysql_data:
